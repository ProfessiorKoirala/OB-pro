version: '3.8'

services:
  postgres:
    image: postgres:14-alpine
    container_name: accounting_postgres
    environment:
      POSTGRES_USER: accounting_admin
      POSTGRES_PASSWORD: accounting_password
      POSTGRES_DB: accounting_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U accounting_admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: accounting_api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: accounting_db
      DB_USER: accounting_admin
      DB_PASSWORD: accounting_password
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      JWT_EXPIRES_IN: 7d
      DEFAULT_CURRENCY: USD
      TIMEZONE: UTC
      LOG_LEVEL: info
    ports:
      - "3000:3000"
    volumes:
      - ./src:/app/src
      - ./logs:/app/logs
    command: npm run dev

volumes:
  postgres_data:
