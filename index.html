    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Plus Jakarta Sans', 'Inter', 'sans-serif'],
              handwriting: ['Caveat', 'cursive'],
            },
            colors: {
              primary: 'rgb(var(--color-primary))',
              secondary: 'rgb(var(--color-secondary))',
              accent: 'rgb(var(--color-accent))',
              background: 'rgb(var(--color-background))',
              surface: 'rgb(var(--color-surface))',
              'text-primary': 'rgb(var(--color-text-primary))',
              'text-secondary': 'rgb(var(--color-text-secondary))',
              gray: {
                50: 'rgb(var(--gray-50))',
                100: 'rgb(var(--gray-100))',
                200: 'rgb(var(--gray-200))',
                300: 'rgb(var(--gray-300))',
                400: 'rgb(var(--gray-400))',
                500: 'rgb(var(--gray-500))',
                600: 'rgb(var(--gray-600))',
                700: 'rgb(var(--gray-700))',
                800: 'rgb(var(--gray-800))',
                900: 'rgb(var(--gray-900))',
                950: 'rgb(var(--gray-950))',
              }
            },
            animation: {
              'fade-in': 'fadeIn 0.4s ease-out',
              'slide-up': 'slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards',
              'slide-down': 'slideDown 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards',
              'pulse-soft': 'pulseSoft 2s ease-in-out infinite',
              'shake': 'shake 0.5s cubic-bezier(.36,.07,.19,.97) both',
              'hi': 'hi 3s ease-in-out infinite',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: 0, transform: 'scale(0.99)' },
                '100%': { opacity: 1, transform: 'scale(1)' },
              },
              slideUp: {
                 '0%': { transform: 'translate3d(0, 15px, 0)', opacity: 0 },
                 '100%': { transform: 'translate3d(0, 0, 0)', opacity: 1 },
              },
              slideDown: {
                 '0%': { transform: 'translate3d(0, -15px, 0)', opacity: 0 },
                 '100%': { transform: 'translate3d(0, 0, 0)', opacity: 1 },
              },
              pulseSoft: {
                '0%, 100%': { opacity: 1 },
                '50%': { opacity: 0.8 },
              },
              shake: {
                '10%, 90%': { transform: 'translate3d(-1px, 0, 0)' },
                '20%, 80%': { transform: 'translate3d(2px, 0, 0)' },
                '30%, 50%, 70%': { transform: 'translate3d(-4px, 0, 0)' },
                '40%, 60%': { transform: 'translate3d(4px, 0, 0)' },
              },
              hi: {
                '0%, 100%': { transform: 'scale(0) translateY(0)', opacity: 0 },
                '10%, 90%': { transform: 'scale(1) translateY(-5px)', opacity: 1 },
                '20%, 40%, 60%, 80%': { transform: 'scale(1) translateY(-5px) rotate(-10deg)' },
                '30%, 50%, 70%': { transform: 'scale(1) translateY(-5px) rotate(10deg)' },
              }
            }
          },
        },
      }
    </script>
